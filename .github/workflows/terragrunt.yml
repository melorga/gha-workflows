name: Terragrunt CI/CD

# NOTE: Terragrunt 1.0 introduced breaking changes (CAS, hcl fmt, experiments).
# Consumers upgrading from 0.x should review the Terragrunt 1.0 migration notes:
# https://terragrunt.gruntwork.io/docs/migrate/migrating-from-0.x/

on:
  workflow_call:
    inputs:
      terragrunt_version:
        description: 'Terragrunt version to use'
        required: false
        type: string
        default: '1.0.3'
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.15.1'
      working_directory:
        description: 'Working directory for Terragrunt'
        required: false
        type: string
        default: '.'
      environment:
        description: 'Environment to deploy to'
        required: false
        type: string
        default: 'dev'
      aws_role_arn:
        description: 'AWS IAM role ARN to assume via OIDC'
        required: false
        type: string
      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-east-1'

permissions:
  contents: read
  id-token: write
  pull-requests: write

# NOTE: do NOT declare workflow-level `concurrency:` here. In a reusable
# workflow `github.workflow` evaluates to the CALLER's workflow name; if the
# caller also declares `concurrency:` with the same expression (the common
# pattern), both contexts produce an identical group key and self-deadlock.
# GitHub then cancels the called workflow at orchestration time, before any
# sub-jobs register check runs. Concurrency is the caller's responsibility.

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt_version }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Terragrunt Format Check
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt hclfmt --terragrunt-check

      - name: Terragrunt Validate
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt run-all validate --terragrunt-non-interactive

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt_version }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Terragrunt Plan
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt run-all plan --terragrunt-non-interactive

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt_version }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Terragrunt Apply
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt run-all apply --terragrunt-non-interactive
